<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Belpex 15m Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050a12; --card: #0f1e35; --accent: #00d9ff; --text: #f0f4ff; --border: #1a2f4a;
            --color-green: #00ff88; --color-orange: #ffaa00; --color-red: #ff3366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: radial-gradient(circle at top, #0a1428 0%, #050a12 100%);
            color: var(--text); font-family: 'Outfit', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh; overflow-x: hidden;
        }
        
        /* LIVE STATUS BANNER */
        .status-banner {
            border-radius: 24px; padding: 25px; margin-bottom: 20px; text-align: center;
            border: 4px solid rgba(255,255,255,0.1); transition: all 0.5s ease;
        }
        .live-clock { font-family: 'Space Mono', monospace; font-size: 1.1rem; opacity: 0.8; margin-bottom: 5px; display: block; }
        .current-price-val { font-family: 'Space Mono', monospace; font-size: 3.5rem; font-weight: bold; display: block; line-height: 1; }
        .status-msg { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; margin: 15px 0; display: block; }
        .gif-container img { width: 100%; max-width: 260px; border-radius: 15px; margin-top: 10px; }

        /* SMOOTH ANIMATIONS */
        @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes subtleShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        
        .anim-cheap { animation: floaty 3s infinite ease-in-out; border-color: var(--color-green) !important; }
        .anim-expensive { animation: subtleShake 0.4s infinite linear; border-color: var(--color-red) !important; }

        /* CHART - PILL BARS */
        .chart-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 25px 12px 10px; margin-bottom: 20px; }
        .bars { display: flex; align-items: flex-end; height: 160px; gap: 2px; padding-bottom: 8px; border-bottom: 1px solid var(--border); position: relative; }
        
        .bar { 
            flex: 1; min-width: 3px; border-radius: 50px; /* Pill shape */
            position: relative; transition: height 0.3s ease, filter 0.2s; 
            z-index: 1; /* Default layer */
        }
        
        /* Hover Tooltip Fixes */
        .bar::after {
            content: attr(data-tip); 
            position: absolute; 
            bottom: 100%; /* Sits above the bar */
            left: 50%; 
            transform: translateX(-50%) translateY(-10px); /* Lifted higher to avoid neighbors */
            background: #ffffff; color: #000000; font-size: 0.75rem; font-family: 'Space Mono';
            padding: 6px 10px; border-radius: 8px; opacity: 0; pointer-events: none; 
            white-space: nowrap; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .bar:hover { 
            filter: brightness(1.4); 
            z-index: 999 !important; /* Forces hovered bar to the front */
        }

        .bar:hover::after { 
            opacity: 1; 
            transform: translateX(-50%) translateY(-15px); /* Smooth lift on hover */
        }

        .hour-axis { display: flex; justify-content: space-between; padding: 10px 5px; font-size: 0.6rem; opacity: 0.5; font-family: 'Space Mono'; }

        details { background: var(--card); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; margin-top: 10px; }
        summary { padding: 20px; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; outline: none; }
    </style>
</head>
<body>

    <div id="content">
        <div style="text-align: center; padding: 50px; font-family: 'Space Mono'; color: var(--accent);">REFRESHING DATA...</div>
    </div>

    <script>
        const format12h = (date) => {
            return date.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        };

        function getBarColor(price, min, max) {
            const range = max - min;
            const pos = (price - min) / (range || 1);
            if (pos <= 0.40) return 'var(--color-green)';
            if (pos <= 0.70) return 'var(--color-orange)';
            return 'var(--color-red)';
        }

        async function init() {
            const today = new Date().toISOString().split('T')[0];
            const tom = new Date(); tom.setDate(tom.getDate() + 1);
            const tomorrow = tom.toISOString().split('T')[0];
            
            const api = `https://api.energy-charts.info/price?bzn=BE&start=${today}&end=${tomorrow}`;
            const proxy = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(api)}`;

            try {
                const res = await fetch(proxy);
                const data = await res.json();
                render(data);
            } catch (e) {
                setTimeout(init, 5000);
            }
        }

        function createChart(items, title) {
            const prices = items.map(i => i.price);
            const min = Math.min(...prices), max = Math.max(...prices);
            return `
                <div class="chart-container">
                    <div style="font-size:0.7rem; opacity:0.6; margin-bottom:15px; text-transform:uppercase;">${title}</div>
                    <div class="bars">
                        ${items.map(i => {
                            const h = ((i.price - min) / (max - min || 1)) * 100;
                            return `<div class="bar" style="height:${Math.max(12, h)}%; background:${getBarColor(i.price, min, max)}" 
                                         data-tip="${i.time} • €${i.price.toFixed(2)}"></div>`;
                        }).join('')}
                    </div>
                    <div class="hour-axis"><span>12 AM</span><span>6 AM</span><span>12 PM</span><span>6 PM</span><span>11 PM</span></div>
                </div>`;
        }

        function render(data) {
            const now = new Date();
            const todayDay = now.getDate();
            
            let todayItems = [], tomItems = [];
            data.unix_seconds.forEach((ts, i) => {
                const d = new Date(ts * 1000);
                const item = { dObj: d, time: format12h(d), price: data.price[i], day: d.getDate() };
                if (d.getDate() === todayDay) todayItems.push(item);
                else tomItems.push(item);
            });

            const currentItem = todayItems.find(i => (now - i.dObj) < 900000 && (now - i.dObj) >= 0) || todayItems[todayItems.length-1];
            const tMin = Math.min(...todayItems.map(i => i.price));
            const tMax = Math.max(...todayItems.map(i => i.price));
            const color = getBarColor(currentItem.price, tMin, tMax);
            
            let statusText, bannerClass, gif;
            if (color === 'var(--color-green)') {
                statusText = "🥳 YAY!! ELECTRICITY IS CHEAP, GO CRAZY!!";
                bannerClass = "anim-cheap";
                gif = "https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif";
            } else {
                statusText = "🚨 AWARE: EXPENSIVE ENERGY, USE CAREFULLY!!";
                bannerClass = "anim-expensive";
                gif = "https://media.giphy.com/media/vyTnNTrs3wqQ0UIvwE/giphy.gif";
            }

            document.getElementById('content').innerHTML = `
                <div class="status-banner ${bannerClass}" style="background: rgba(15,30,53,0.8)">
                    <span class="live-clock">${now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true})}</span>
                    <span class="current-price-val" style="color:${color}">€${currentItem.price.toFixed(2)}</span>
                    <span class="status-msg" style="color:${color}">${statusText}</span>
                    <div class="gif-container"><img src="${gif}"></div>
                </div>

                ${createChart(todayItems, "Today's 15m Price Track")}

                ${tomItems.length ? `
                <details>
                    <summary>Tomorrow's Rates <span style="color:var(--color-green); font-size:0.7rem">LIVE</span></summary>
                    <div style="padding:10px;">${createChart(tomItems, "Tomorrow's Forecast")}</div>
                </details>` : ''}
            `;
        }

        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
