<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a1428">
    <title>Belpex Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0a1428;
            --darker-bg: #050a12;
            --card-bg: #0f1e35;
            --accent-blue: #00d9ff;
            --accent-cyan: #00f0ff;
            --cheapest: #00ff41;
            --expensive: #ff006e;
            --neutral: #6366f1;
            --text-primary: #f0f4ff;
            --text-secondary: #a8b5d1;
            --border-color: #1a2f4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        header {
            padding: max(1.5rem, env(safe-area-inset-top)) 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(10, 20, 40, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-family: 'Space Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Loading & Error States */
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            text-align: center;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .error-msg {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--expensive);
            color: var(--expensive);
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--card-bg) 0%, rgba(15, 30, 53, 0.5) 100%);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            position: relative;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .stat-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'Space Mono', monospace;
        }

        .cheapest-card .stat-value {
            color: var(--cheapest);
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .expensive-card .stat-value {
            color: var(--expensive);
            text-shadow: 0 0 15px rgba(255, 0, 110, 0.3);
        }

        /* Bar Chart */
        .chart-container {
            background: rgba(15, 30, 53, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-secondary);
        }

        .price-bars {
            display: flex;
            align-items: flex-end;
            height: 150px;
            gap: 4px;
        }

        .price-bar {
            flex: 1;
            border-radius: 4px 4px 0 0;
            position: relative;
            transition: opacity 0.2s;
        }

        .price-bar.cheapest { background: linear-gradient(to top, var(--cheapest), rgba(0, 255, 65, 0.4)); }
        .price-bar.expensive { background: linear-gradient(to top, var(--expensive), rgba(255, 0, 110, 0.4)); }
        .price-bar.neutral { background: linear-gradient(to top, var(--neutral), rgba(99, 102, 241, 0.4)); }

        /* List View */
        .list-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
        }
        
        .list-item:last-child { border-bottom: none; }
        .list-item .time { color: var(--text-primary); }
        .list-item .price.cheapest { color: var(--cheapest); }
        .list-item .price.expensive { color: var(--expensive); }
        .list-item .price.neutral { color: var(--accent-blue); }

        /* Accordion for Tomorrow */
        details.tomorrow-view {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 2rem;
        }

        details.tomorrow-view summary {
            padding: 1.25rem;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            list-style: none;
            cursor: pointer;
        }

        details.tomorrow-view summary::-webkit-details-marker { display: none; }
        
        .tomorrow-status {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        .tomorrow-status.available {
            background: rgba(0, 255, 65, 0.15);
            color: var(--cheapest);
        }

        .accordion-content {
            border-top: 1px solid var(--border-color);
            padding: 1rem;
        }
        
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <header>
        <div class="header-title">BELPEX</div>
        <div id="header-date" style="color: var(--text-secondary); font-size: 0.9rem;"></div>
    </header>

    <main class="container">
        
        <div id="loading-state" class="status-container">
            <div class="loader"></div>
            <p>Fetching latest energy rates...</p>
        </div>

        <div id="error-state" class="status-container hidden">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--expensive)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <div id="error-text" class="error-msg"></div>
            <button onclick="initApp()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--accent-blue); border: none; border-radius: 8px; color: #fff; font-weight: bold;">Try Again</button>
        </div>

        <div id="app-content" class="hidden">
            <div class="stats-grid">
                <div class="stat-card cheapest-card">
                    <div class="stat-label">Cheapest</div>
                    <div class="stat-value" id="cheap-price">--</div>
                    <div class="stat-time" id="cheap-time">--</div>
                </div>
                <div class="stat-card expensive-card">
                    <div class="stat-label">Expensive</div>
                    <div class="stat-value" id="exp-price">--</div>
                    <div class="stat-time" id="exp-time">--</div>
                </div>
            </div>

            <div class="chart-container">
                <div class="chart-title">Today's Trend</div>
                <div class="price-bars" id="today-chart"></div>
            </div>

            <div class="chart-title">Today's Hourly Rates</div>
            <div class="list-container" id="today-list"></div>

            <details class="tomorrow-view" id="tomorrow-accordion">
                <summary>
                    Tomorrow's Rates
                    <span id="tomorrow-badge" class="tomorrow-status">Checking...</span>
                </summary>
                <div class="accordion-content" id="tomorrow-content">
                    <div style="text-align:center; padding: 1rem; color: var(--text-secondary);">
                        Data not yet available.<br>Will auto-update when published.
                    </div>
                </div>
            </details>
        </div>
    </main>

    <script>
        let autoUpdateTimer = null;

        // Utilities
        const formatNum = (num) => String(num).padStart(2, '0');
        
        const formatDateTime = (dateObj) => {
            const h = formatNum(dateObj.getHours());
            const d = formatNum(dateObj.getDate());
            const m = formatNum(dateObj.getMonth() + 1);
            const y = String(dateObj.getFullYear()).slice(-2);
            return `${h}:00  ${d}/${m}/${y}`;
        };

        const formatApiDate = (dateObj) => {
            const y = dateObj.getFullYear();
            const m = formatNum(dateObj.getMonth() + 1);
            const d = formatNum(dateObj.getDate());
            return `${y}-${m}-${d}`;
        };

        async function fetchBelpexData() {
            const now = new Date();
            const todayStr = formatApiDate(now);
            
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = formatApiDate(tomorrow);

            const url = `https://api.energy-charts.info/price?bzn=BE&start=${todayStr}&end=${tomorrowStr}`;
            
            const response = await fetch(url);
            if (!response.ok) throw new Error("Server returned an error.");
            
            const data = await response.json();
            if (!data.unix_seconds || data.unix_seconds.length === 0) {
                throw new Error("No data available for these dates yet.");
            }
            return data;
        }

        function processAndRender(apiData) {
            const now = new Date();
            const todayStr = formatApiDate(now);
            const tomorrowStr = formatApiDate(new Date(now.setDate(now.getDate() + 1)));

            const todayData = [];
            const tomorrowData = [];

            for (let i = 0; i < apiData.unix_seconds.length; i++) {
                const price = apiData.price[i];
                if (price === null || price === undefined) continue;

                let ts = apiData.unix_seconds[i];
                if (ts < 10000000000) ts *= 1000; 
                
                const dateObj = new Date(ts);
                const localDateStr = formatApiDate(dateObj);
                const item = { date: dateObj, price: price };
                
                if (localDateStr === todayStr) todayData.push(item);
                else if (localDateStr === tomorrowStr) tomorrowData.push(item);
            }

            if (todayData.length > 0) renderToday(todayData);
            renderTomorrow(tomorrowData);
        }

        function getCategory(price, min, max) {
            const range = max - min || 1;
            if (price <= min + (range * 0.33)) return 'cheapest';
            if (price >= max - (range * 0.33)) return 'expensive';
            return 'neutral';
        }

        function renderToday(data) {
            const minPrice = Math.min(...data.map(d => d.price));
            const maxPrice = Math.max(...data.map(d => d.price));
            
            let cheapest = data[0], expensive = data[0];
            data.forEach(d => {
                if(d.price < cheapest.price) cheapest = d;
                if(d.price > expensive.price) expensive = d;
            });

            // Update Cards
            document.getElementById('cheap-price').innerText = `€${cheapest.price.toFixed(2)}`;
            document.getElementById('cheap-time').innerText = formatDateTime(cheapest.date);
            
            document.getElementById('exp-price').innerText = `€${expensive.price.toFixed(2)}`;
            document.getElementById('exp-time').innerText = formatDateTime(expensive.date);

            // Update Chart
            const chartHTML = data.map(item => {
                const cat = getCategory(item.price, minPrice, maxPrice);
                const heightPct = Math.max(10, ((item.price - minPrice) / (maxPrice - minPrice || 1)) * 100);
                return `<div class="price-bar ${cat}" style="height: ${heightPct}%"></div>`;
            }).join('');
            document.getElementById('today-chart').innerHTML = chartHTML;

            // Update List
            const listHTML = data.map(item => {
                const cat = getCategory(item.price, minPrice, maxPrice);
                return `
                    <div class="list-item">
                        <span class="time">${formatDateTime(item.date)}</span>
                        <span class="price ${cat}">€${item.price.toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('today-list').innerHTML = listHTML;
        }

        function renderTomorrow(data) {
            const badge = document.getElementById('tomorrow-badge');
            const content = document.getElementById('tomorrow-content');

            if (data.length === 0) {
                badge.innerText = 'Not Available';
                badge.className = 'tomorrow-status';
                content.innerHTML = `<div style="text-align:center; padding: 1rem; color: var(--text-secondary);">Rates not yet published.<br>Auto-updating in background...</div>`;
                
                // Auto check every 10 mins if missing
                if (!autoUpdateTimer) autoUpdateTimer = setInterval(initApp, 10 * 60 * 1000);
            } else {
                badge.innerText = 'Available';
                badge.className = 'tomorrow-status available';
                
                const minPrice = Math.min(...data.map(d => d.price));
                const maxPrice = Math.max(...data.map(d => d.price));

                content.innerHTML = `<div class="list-container" style="margin-bottom:0; border:none;">` + 
                    data.map(item => {
                        const cat = getCategory(item.price, minPrice, maxPrice);
                        return `
                            <div class="list-item">
                                <span class="time">${formatDateTime(item.date)}</span>
                                <span class="price ${cat}">€${item.price.toFixed(2)}</span>
                            </div>
                        `;
                    }).join('') + `</div>`;

                if (autoUpdateTimer) {
                    clearInterval(autoUpdateTimer);
                    autoUpdateTimer = null;
                }
            }
        }

        async function initApp() {
            document.getElementById('loading-state').classList.remove('hidden');
            document.getElementById('error-state').classList.add('hidden');
            document.getElementById('app-content').classList.add('hidden');

            const now = new Date();
            document.getElementById('header-date').innerText = `${formatNum(now.getDate())}/${formatNum(now.getMonth()+1)}/${String(now.getFullYear()).slice(-2)}`;

            try {
                const data = await fetchBelpexData();
                processAndRender(data);
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
                document.getElementById('error-text').innerText = err.message || "Failed to connect. Please try again.";
            }
        }

        // Start App
        window.onload = initApp;

    </script>
</body>
</html>
